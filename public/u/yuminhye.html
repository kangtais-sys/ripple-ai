<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@유민혜 · Ssobi</title>
<meta property="og:title" content="@유민혜 — 코덕 사생활">
<meta property="og:description" content="신상만 밝히는 코덕 사생활 · 오늘의 공구부터 유튜브 신영상까지">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%}
body{font-family:'Pretendard Variable','Pretendard',sans-serif;background:linear-gradient(160deg,#FEF3F2 0%,#FCE7E4 50%,#F5DEDA 100%);color:#1F1317;line-height:1.5;padding:28px 20px calc(40px + env(safe-area-inset-bottom));min-height:100vh;display:flex;flex-direction:column;align-items:center}
.wrap{width:100%;max-width:440px}
.event{margin:-28px -20px 20px;padding:10px;background:#E85D75;color:#fff;text-align:center;font-size:12px;font-weight:800;letter-spacing:-.2px}
.av{width:72px;height:72px;border-radius:50%;margin:0 auto 14px;background:url('https://images.unsplash.com/photo-1556228720-195a672e8a03?auto=format&fit=crop&w=200&q=80') center/cover;box-shadow:0 8px 22px rgba(232,93,117,.15),inset 0 0 0 2px rgba(255,255,255,.6)}
h1{font-size:28px;font-weight:900;letter-spacing:-.6px;text-align:center;color:#1F1317}
.sub{font-size:13px;font-weight:500;text-align:center;color:rgba(31,19,23,.7);margin-top:6px;line-height:1.55}
.ch{display:flex;justify-content:center;gap:10px;margin:16px 0 22px}
.ch a{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.6);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;color:#1F1317;text-decoration:none;font-size:14px;border:1px solid rgba(255,255,255,.9)}
.blocks{display:flex;flex-direction:column;gap:10px}
.blk{background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(14px);border:1px solid rgba(255,255,255,.9);border-radius:14px;padding:16px 18px;color:#1F1317;text-decoration:none;font-size:15px;font-weight:800;letter-spacing:-.2px;text-align:center;transition:transform .2s,box-shadow .2s;display:block;box-shadow:0 6px 18px rgba(232,93,117,.08)}
.blk:hover,.blk:active{transform:translateY(-2px);box-shadow:0 10px 24px rgba(232,93,117,.14)}
.blk.image{padding:0;height:160px;background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-end;padding:16px;color:#fff;font-size:16px;text-align:left}
.blk.image::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.45));border-radius:inherit}
.blk.image span{position:relative;z-index:1;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.header{font-size:15px;font-weight:900;color:#1F1317;padding:14px 4px 4px;letter-spacing:-.3px}
.alert{background:linear-gradient(135deg,#FEF3C7,#FED7AA);border:1px solid #FCD34D;color:#7C2D12;font-weight:700;font-size:13px;text-align:left;padding:14px 16px;display:flex;gap:10px;align-items:center;border-radius:12px}
.alert b{font-weight:900;color:#1F1317}
.cta{margin-top:22px;background:#1F1317;color:#FEF3F2;padding:14px;text-align:center;font-size:13px;font-weight:800;border-radius:14px;text-decoration:none;display:block;letter-spacing:-.2px}
.power{text-align:center;font-size:10px;color:rgba(31,19,23,.5);font-weight:600;margin-top:14px;letter-spacing:.4px}
.power a{color:inherit;text-decoration:none}
.propose-fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));right:20px;width:52px;height:52px;border-radius:50%;background:#E85D75;color:#fff;border:none;cursor:pointer;box-shadow:0 8px 20px rgba(232,93,117,.36);display:flex;align-items:center;justify-content:center;font-size:22px}
.propose-fab:hover{transform:scale(1.05)}
.modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px}
.modal.on{display:flex}
.modal .sheet{background:#fff;border-radius:18px;padding:24px;max-width:380px;width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:900;color:#1F1317;margin-bottom:4px;letter-spacing:-.4px}
.modal .desc{font-size:12.5px;color:rgba(31,19,23,.65);margin-bottom:16px}
.modal input,.modal textarea,.modal select{width:100%;padding:11px 13px;border:1px solid rgba(31,19,23,.14);border-radius:8px;font-size:13px;margin-bottom:8px;font-family:inherit;outline:none;background:#FAFAF9;color:#1F1317;resize:vertical}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:#E85D75}
.modal .submit{width:100%;padding:13px;background:#1F1317;color:#fff;border:none;font-size:14px;font-weight:800;cursor:pointer;border-radius:10px;margin-top:4px}
.modal .close{width:100%;padding:11px;background:none;border:1px solid rgba(31,19,23,.14);color:rgba(31,19,23,.65);border-radius:10px;margin-top:6px;font-size:13px;font-weight:700;cursor:pointer}
@media (max-width:400px){body{padding:24px 16px 40px}h1{font-size:24px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="event">✨ 오늘만 30% 할인 공구 중 →</div>
  <div class="av"></div>
  <h1>@유민혜</h1>
  <div class="sub">신상만 밝히는 코덕 사생활<br>됐어, 신상 대신 사보고 돈 아껴줄게</div>
  <div class="ch">
    <a href="https://instagram.com/yuminhye" aria-label="Instagram">📷</a>
    <a href="https://tiktok.com/@yuminhye" aria-label="TikTok">🎵</a>
    <a href="https://youtube.com/@yuminhye" aria-label="YouTube">▶️</a>
  </div>
  <div class="blocks">
    <a class="blk" href="/s/a1b2c3">🛒 오늘의 공구 · 올리브영</a>
    <a class="blk" href="/s/d4e5f6">▶️ 유튜브 신영상 · 봄 데일리 루틴</a>
    <div class="header">협업 문의</div>
    <a class="blk image" href="/s/g7h8i9" style="background-image:url('https://images.unsplash.com/photo-1570554520913-ce31ceaeb0ab?auto=format&fit=crop&w=800&q=80')"><span>MILLIMILLI 공식몰 →</span></a>
    <div class="alert">🔔 <div><b>신규 링크 알림 받기</b><br><span style="font-weight:600">새 공구·게시물 올라오면 이메일로 알려드려요</span></div></div>
  </div>
  <a class="cta" href="https://ssobi.ai/?ref=yuminhye">✨ 나도 1초만에 내 링크 만들기 →</a>
  <div class="power">Powered by <a href="https://ssobi.ai">Ssobi.</a></div>
</div>
<button class="propose-fab" onclick="openModal()" aria-label="제안하기">💌</button>
<div class="modal" id="propose-modal">
  <div class="sheet">
    <h2>제안 보내기</h2>
    <div class="desc">보내신 내용은 @유민혜 님께 전달돼요</div>
    <input id="p-name" placeholder="이름 또는 브랜드명">
    <input id="p-contact" placeholder="이메일 / 연락처">
    <select id="p-type"><option>협찬·광고</option><option>공동구매</option><option>수출·유통</option><option>기타</option></select>
    <textarea id="p-msg" rows="4" placeholder="자세한 내용을 적어주세요"></textarea>
    <button class="submit" onclick="submit()">보내기</button>
    <button class="close" onclick="closeModal()">취소</button>
  </div>
</div>
<script>
function openModal(){document.getElementById('propose-modal').classList.add('on')}
function closeModal(){document.getElementById('propose-modal').classList.remove('on')}
function submit(){
  var n=document.getElementById('p-name').value;
  var m=document.getElementById('p-msg').value;
  if(!n||!m){alert('이름과 내용은 꼭 입력해주세요');return}
  alert('제안이 전달됐어요!');
  closeModal();
}
document.getElementById('propose-modal').addEventListener('click',function(e){if(e.target===this) closeModal()});
</script>
</body>
</html>
